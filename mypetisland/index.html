<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>いつでもペット — Legal</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
         max-width: 760px; margin: 2rem auto; padding: 0 1.25rem; line-height: 1.7; color: #222; background: #fafafa; }
  h1 { font-size: 1.6rem; border-bottom: 2px solid #ddd; padding-bottom: .4rem; }
  h2 { font-size: 1.15rem; margin-top: 2rem; color: #333; }
  p, li { font-size: .95rem; }
  a { color: #0a64c4; text-decoration: none; }
  a:hover { text-decoration: underline; }
  hr { border: 0; border-top: 1px solid #ddd; margin: 2rem 0 1rem; }
  footer { font-size: .8rem; color: #777; }
  .lang-switch { display: inline-flex; gap: .25rem; margin: 0 0 1.5rem; padding: .25rem;
                 background: #ececec; border-radius: 6px; }
  .lang-switch button { border: 0; padding: .35rem 1rem; background: transparent;
                        border-radius: 4px; cursor: pointer; font-size: .9rem; color: #555;
                        font-family: inherit; }
  .lang-switch button.active { background: #fff; color: #000; box-shadow: 0 1px 2px rgba(0,0,0,.1); }
  .lang-content { display: none; }
  .lang-content.active { display: block; }
  @media (prefers-color-scheme: dark) {
    body { background: #141414; color: #e6e6e6; }
    h1 { border-color: #333; }
    h2 { color: #ddd; }
    a { color: #6fb6ff; }
    hr { border-color: #333; }
    footer { color: #888; }
    .lang-switch { background: #2a2a2a; }
    .lang-switch button { color: #aaa; }
    .lang-switch button.active { background: #444; color: #fff; box-shadow: none; }
  }
</style>
